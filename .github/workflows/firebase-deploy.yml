name: Firebase Deploy

on:
  push:
    branches:
      - main      # auto-deploy setiap push ke main
  workflow_dispatch:  # bisa dipicu manual dari GitHub

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting to Firebase
        run: firebase deploy --only hosting --project zleep-id
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Database Rules
        run: firebase deploy --only database --project zleep-id
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
